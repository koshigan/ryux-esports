<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RYUX ESPORTS - Force View</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      overflow-x: hidden;
    }
    .force-screen {
      min-height: calc(100vh - 64px);
      padding: 32px;
      position: relative;
      z-index: 1;
    }
    .force-screen::before,
    .force-screen::after {
      content: '';
      position: fixed;
      width: 480px;
      height: 480px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.18;
      pointer-events: none;
      z-index: -1;
    }
    .force-screen::before {
      top: -120px;
      right: -120px;
      background: rgba(255, 59, 59, 0.34);
    }
    .force-screen::after {
      bottom: -180px;
      left: -120px;
      background: rgba(56, 189, 248, 0.18);
    }
    .hero-card {
      border-radius: 22px;
      border: 1px solid var(--border);
      background: rgba(14, 17, 21, 0.88);
      padding: 40px;
      box-shadow: var(--shadow);
      margin-bottom: 40px;
    }
    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.82rem;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .eyebrow::before {
      content: '';
      width: 38px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }
    .force-title {
      font-size: clamp(2.5rem, 6vw, 4rem);
      margin-bottom: 10px;
    }
    .force-subtitle {
      color: var(--text-muted);
      font-size: 1.2rem;
      margin-bottom: 24px;
    }
    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .team-card {
      position: relative;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 59, 59, 0.06), rgba(255,255,255,0.02)),
        rgba(17, 20, 25, 0.96);
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
    }
    .team-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow), var(--shadow-glow);
      transform: translateY(-5px) scale(1.01);
    }
    .team-card-image {
      width: 100%;
      aspect-ratio: 16 / 10;
      border-radius: 14px;
      margin-bottom: 14px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: radial-gradient(circle at top, rgba(255, 59, 59, 0.2), transparent 62%), rgba(255,255,255,0.03);
    }
    .team-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .team-card-image span {
      font-family: var(--font-display);
      font-size: 2rem;
      color: #fff;
      text-shadow: 0 0 20px rgba(255, 59, 59, 0.45);
    }
    .graph-panel {
      border-radius: 22px;
      border: 1px solid var(--border);
      background: rgba(14, 17, 21, 0.9);
      padding: 30px;
      box-shadow: var(--shadow);
    }
    .graph-title {
      font-size: 1.8rem;
      margin-bottom: 20px;
    }
    .vertical-chart-container {
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      gap: 15px;
      height: 280px;
      margin-top: 30px;
      padding-top: 20px;
      padding-bottom: 10px;
      overflow-x: auto;
    }
    .vertical-bar-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
      flex: 1;
      min-width: 60px;
    }
    .vertical-bar-track {
      width: 48px;
      height: 100%;
      background: rgba(255,255,255,0.05);
      border-radius: 8px 8px 0 0;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      margin: 12px 0;
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom: none;
    }
    .vertical-bar-fill {
      width: 100%;
      background: linear-gradient(0deg, var(--accent3), var(--accent));
      box-shadow: 0 0 16px rgba(255, 59, 59, 0.28);
      transition: height 1s ease;
      border-radius: 8px 8px 0 0;
    }
    .vertical-bar-label {
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      text-align: center;
      word-break: break-word;
    }
    .vertical-bar-value {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <nav class="navbar" id="navbar"></nav>

  <main class="force-screen">
    <div class="container">
      <div class="hero-card">
        <div class="eyebrow" id="force-badge">Force</div>
        <h1 class="force-title" id="force-name">Loading Force...</h1>
        <p class="force-subtitle" id="force-captain">Captaincy: -</p>
        <div>
          <a class="btn btn-secondary" href="/guild-war">← Back to Guild War</a>
        </div>
      </div>

      <div id="force-actions" style="display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap;"></div>

      <div class="teams-section">
        <h2 class="mb-16">Teams Under Command</h2>
        <div class="teams-grid" id="teams-grid">
          <!-- Teams rendered here -->
        </div>
      </div>


    </div>
  </main>

  <script src="/js/utils.js"></script>
  <script src="/js/guild-war-core.js"></script>
  <script src="/js/guild-war-force.js"></script>
</body>
</html>
